<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiszki — польско-русские карточки</title>
<meta name="description" content="Тренажёр польской лексики: 6000 слов по 43 темам, карточки с сохранением прогресса.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Spectral:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F6FB; --panel:#FFFFFF; --ink:#1E1B2E; --muted:#6B7280;
  --line:#E7E6F2; --indigo:#4F46E5; --indigo-soft:#EEF2FF;
  --ok:#059669; --shadow:0 10px 30px rgba(30,27,46,.08);
}
[data-theme="dark"]{
  --bg:#131120; --panel:#1C192E; --ink:#F0EEFA; --muted:#9A95B8;
  --line:#2C2844; --indigo:#8B85F4; --indigo-soft:#26224a;
  --ok:#34D399; --shadow:0 10px 30px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  transition:background .3s,color .3s;min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:20px 16px 48px}
header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;flex-wrap:wrap}
h1{font-size:20px;font-weight:800;letter-spacing:-.02em}
h1 .dot{color:var(--indigo)}
.tagline{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:18px}
.hbtns{display:flex;gap:8px;flex-wrap:wrap}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.chip-btn{padding:8px 14px;border-radius:10px;border:1.5px solid var(--line);
  background:var(--panel);font-weight:700;font-size:13px;transition:.15s}
.chip-btn:hover{border-color:var(--indigo)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.tcard{position:relative;display:flex;flex-direction:column;gap:6px;text-align:left;
  background:var(--panel);border:1.5px solid var(--line);border-radius:12px;
  padding:12px 14px 12px 20px;transition:.15s;overflow:hidden}
.tcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--tc)}
.tcard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--tc)}
.tcard .tt{font-weight:800;font-size:14px;line-height:1.25}
.tcard .tn{font-size:12px;color:var(--muted);font-weight:600}
.tbar{height:5px;border-radius:3px;background:var(--line);overflow:hidden}
.tbarf{height:100%;background:var(--tc);border-radius:3px}
.tcard.all{grid-column:1/-1;background:linear-gradient(100deg,var(--indigo),#7C3AED);color:#fff;border:none}
.tcard.all::before{display:none}
.tcard.all .tn{color:rgba(255,255,255,.78)}
.tcard.all .tt{font-size:16px}
.tcard.all .tbar{background:rgba(255,255,255,.25)}
.tcard.all .tbarf{background:#fff}

.trainer{display:none}
.trainer.show{display:block}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.crumb{font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px}
.crumb .sw{width:12px;height:12px;border-radius:4px;background:var(--tc,var(--indigo))}
.back{color:var(--muted);font-weight:700;font-size:13px;padding:6px 10px;border-radius:8px}
.back:hover{color:var(--indigo);background:var(--indigo-soft)}
.pbar{height:6px;border-radius:3px;background:var(--line);overflow:hidden;margin-bottom:6px}
.pfill{height:100%;width:0%;background:var(--tc,var(--indigo));transition:width .3s;border-radius:3px}
.pnums{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:16px}

.stage{perspective:1200px;margin:0 auto;max-width:560px}
.card{position:relative;width:100%;height:300px;transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,.1,.2,1);cursor:pointer}
.card.flip{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;
  background:var(--panel);border:1.5px solid var(--line);box-shadow:var(--shadow);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px 34px;text-align:center;overflow:hidden}
.face::before{content:"";position:absolute;top:0;left:0;right:0;height:7px;background:var(--tc,var(--indigo))}
.face .lang{position:absolute;top:16px;left:20px;font-size:11px;font-weight:800;
  letter-spacing:.14em;color:var(--muted)}
.face .known-mark{position:absolute;top:14px;right:18px;font-size:12px;font-weight:800;color:var(--ok)}
.face .word{font-family:'Spectral',serif;font-weight:700;font-size:clamp(22px,4.5vw,34px);
  line-height:1.2;word-break:break-word}
.face.backf{transform:rotateY(180deg)}
.face.backf .word{font-weight:500;font-style:italic;font-size:clamp(19px,4vw,28px)}
.hint{margin-top:14px;font-size:12px;color:var(--muted);font-weight:600}

.ctrls{display:flex;justify-content:center;gap:12px;margin-top:20px}
.big{padding:13px 26px;border-radius:12px;font-weight:800;font-size:15px;transition:.15s}
.know{background:var(--indigo);color:#fff}
.know:hover{filter:brightness(1.08)}
.dunno{background:var(--panel);border:1.5px solid var(--line)}
.dunno:hover{border-color:#DC2626;color:#DC2626}
.sub{display:flex;justify-content:center;gap:16px;margin-top:14px;flex-wrap:wrap}
.mini{font-size:13px;color:var(--muted);font-weight:700;padding:6px 10px;border-radius:8px}
.mini:hover{color:var(--indigo);background:var(--indigo-soft)}

.done{display:none;text-align:center;padding:50px 20px}
.done.show{display:block}
.done .emoji{font-size:44px}
.done h3{font-family:'Spectral',serif;font-size:26px;margin:12px 0 6px}
.done p{color:var(--muted);font-weight:600;margin-bottom:22px}
.done .ctrls{margin-top:0}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);
  background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:10px;
  font-size:13px;font-weight:700;transition:transform .3s;z-index:9}
.toast.show{transform:translateX(-50%) translateY(0)}

@media (max-width:520px){
  .card{height:250px}
  .big{padding:12px 18px;font-size:14px}
}
@media (prefers-reduced-motion:reduce){
  .card{transition:none}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Fiszki<span class="dot">.</span> польские карточки</h1>
    <div class="hbtns">
      <button class="chip-btn" id="dirBtn" title="Направление перевода">PL → RU</button>

      <button class="chip-btn" id="resetBtn" title="Сбросить весь прогресс">Сброс</button>
    </div>
  </header>
  <div class="tagline" id="tagline"></div>

  <section class="picker" id="picker">

  </section>

  <section class="trainer" id="trainer">
    <div class="topbar">

    <div class="pbar"><div class="pfill" id="pfill"></div></div>

    <div class="stage" id="stage">

        <div class="face backf"><span class="lang" id="langB"></span><div class="word" id="wB"></div></div>
      </div>
      <div class="ctrls">
        <button class="big dunno" id="dunnoBtn">Повторить ↻</button>
        <button class="big know" id="knowBtn">Знаю ✓</button>
      </div>
      <div class="sub">
        <button class="mini" id="shufBtn">перемешать</button>
        <button class="mini" id="restartBtn">заново (только невыученные)</button>
        <button class="mini" id="fullBtn">все слова темы</button>
      </div>
    </div>

    <div class="done" id="doneBox">
      <div class="emoji">🎉</div>
      <h3 id="doneH"></h3>
      <p id="doneP"></p>
      <div class="ctrls">
        <button class="big know" id="repeatBtn">Повторить сложные ↻</button>
        <button class="big dunno" id="againBtn">К темам</button>
      </div>
    </div>
  </section>
</div>
<div class="toast" id="toast"></div>

выносливость"],["zadyszka","одышка"],["dostać zadyszki","запыхаться"],["złapać oddech","отдышаться"],["dawać z siebie wszystko","выкладываться полностью"],["przekraczać granice","превосходить пределы"],["motywować się","мотивировать себя"],["systematyczność","систематичность"],["regularne treningi","регулярные тренировки"],["opuszczać trening","пропускать тренировку"],["lenistwo","лень"],["przełamać się","пересилить себя"],["nawyk treningowy","привычка тренироваться"],["efekty","результаты, эффект"],["widoczne efekty","видимые результаты"],["przed i po","до и после"],["cel treningowy","тренировочная цель"],["rekord życiowy","личный рекорд"],["pobić rekord","побить рекорд"]],"c":"#DB2777","s":"Фитнес и тренировки"}];
const TOTAL = THEMES.reduce((a,t)=>a+t.w.length,0);
const LS_KEY = "fiszki-pl-v1";

/* ---------- storage (fails gracefully where localStorage is unavailable) ---------- */
let state = { dir:0, dark:false, known:{} }; // known: { "ti:pl": 1 }
function loadState(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const s = JSON.parse(raw); if(s && typeof s==="object") state = Object.assign(state, s); }
  }catch(e){ console.warn("localStorage недоступен — прогресс не сохранится", e); }
}
let saveT = null;
function saveState(){
  if(saveT) clearTimeout(saveT);
  saveT = setTimeout(()=>{
    try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
    catch(e){ /* приватный режим или недоступное хранилище */ }
  }, 200);
}
const keyOf = (ti, pl) => ti + ":" + pl;
const isKnown = (ti, pl) => !!state.known[keyOf(ti, pl)];

function themeKnownCount(ti){
  let n = 0;
  for(const [pl] of THEMES[ti].w) if(isKnown(ti, pl)) n++;
  return n;
}
function totalKnown(){
  let n = 0;
  for(let i=0;i<THEMES.length;i++) n += themeKnownCount(i);
  return n;
}

/* ---------- ui helpers ---------- */
const $ = id => document.getElementById(id);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
let toastT = null;
function toast(msg){
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  if(toastT) clearTimeout(toastT);
  toastT = setTimeout(()=>t.classList.remove("show"), 2200);
}

/* ---------- theme grid ---------- */
function buildGrid(){
  const g = $("grid");
  g.innerHTML = "";
  const tk = totalKnown();
  const all = document.createElement("button");
  all.className = "tcard all";
  all.innerHTML = `<span class="tt">Все темы вперемешку</span>
    <span class="tn">выучено ${tk} из ${TOTAL}</span>
    <span class="tbar"><span class="tbarf" style="width:${(tk/TOTAL*100).toFixed(1)}%"></span></span>`;
  all.onclick = ()=>start(null);
  g.appendChild(all);
  THEMES.forEach((t,i)=>{
    const kn = themeKnownCount(i);
    const b = document.createElement("button");
    b.className = "tcard";
    b.style.setProperty("--tc", t.c);
    b.innerHTML = `<span class="tt">${t.s}</span>
      <span class="tn">${kn} / ${t.w.length} выучено</span>
      <span class="tbar"><span class="tbarf" style="width:${(kn/t.w.length*100).toFixed(1)}%"></span></span>`;
    b.onclick = ()=>start(i);
    g.appendChild(b);
  });
  $("tagline").textContent = `${TOTAL} слов · 43 темы · прогресс сохраняется в этом браузере`;
}

/* ---------- trainer ---------- */
let deck = [], idx = 0, unknown = [], sessionKnown = 0, curTheme = null;

function collect(ti, onlyUnknown){
  const items = [];
  const push = (i)=>{ for(const [pl,ru] of THEMES[i].w){
    if(!onlyUnknown || !isKnown(i,pl)) items.push([pl,ru,i]);
  }};
  if(ti===null){ for(let i=0;i<THEMES.length;i++) push(i); } else push(ti);
  return items;
}

function start(ti, customDeck, label){
  curTheme = ti;
  let src = customDeck;
  if(!src){
    src = collect(ti, true);
    if(src.length === 0){ src = collect(ti, false); toast("Тема выучена — повторяем всё подряд"); }
  }
  deck = shuffle(src.slice());
  idx = 0; unknown = []; sessionKnown = 0;
  const color = ti===null ? "" : THEMES[ti].c;
  document.documentElement.style.setProperty("--tc", color || "var(--indigo)".trim());
  $("sw").style.background = color || "var(--indigo)";
  $("crumbT").textContent = (label || (ti===null ? "Все темы" : THEMES[ti].s));
  $("picker").style.display = "none";
  $("trainer").classList.add("show");
  $("doneBox").classList.remove("show");
  $("stage").style.display = "block";
  render(true);
}

function render(first){
  const [pl, ru, ti] = deck[idx];
  const front = state.dir===0 ? pl : ru;
  const back  = state.dir===0 ? ru : pl;
  $("card").classList.remove("flip");
  const swap = ()=>{
    $("wF").textContent = front; $("wB").textContent = back;
    $("kmark").textContent = isKnown(ti, pl) ? "✓ выучено" : "";
  };
  first ? swap() : setTimeout(swap, 250);
  $("langF").textContent = state.dir===0 ? "POLSKI" : "РУССКИЙ";
  $("langB").textContent = state.dir===0 ? "РУССКИЙ" : "POLSKI";
  $("pfill").style.width = (idx/deck.length*100) + "%";
  $("pos").textContent = `${idx+1} / ${deck.length}`;
  $("stats").textContent = `знаю: ${sessionKnown} · на повтор: ${unknown.length}`;
}

function answer(known){
  const [pl, , ti] = deck[idx];
  const k = keyOf(ti, pl);
  if(known){ sessionKnown++; state.known[k] = 1; }
  else { unknown.push(deck[idx]); delete state.known[k]; }
  saveState();
  idx++;
  if(idx >= deck.length) return finish();
  render();
}

function finish(){
  $("stage").style.display = "none";
  const box = $("doneBox");
  box.classList.add("show");
  $("pfill").style.width = "100%";
  $("pos").textContent = `${deck.length} / ${deck.length}`;
  if(unknown.length === 0){
    $("doneH").textContent = "Идеально!";
    $("doneP").textContent = `Все ${deck.length} карточек — с первого раза. Tak trzymaj!`;
    $("repeatBtn").style.display = "none";
  } else {
    $("doneH").textContent = "Круг пройден";
    $("doneP").textContent = `Знаешь ${sessionKnown} из ${deck.length}. Осталось добить ${unknown.length}. Прогресс сохранён.`;
    $("repeatBtn").style.display = "";
  }
}

/* ---------- events ---------- */
$("card").onclick = ()=> $("card").classList.toggle("flip");
$("knowBtn").onclick = ()=> answer(true);
$("dunnoBtn").onclick = ()=> answer(false);
$("shufBtn").onclick = ()=>{ const rest = deck.slice(idx); shuffle(rest); deck = deck.slice(0,idx).concat(rest); render(); };
$("restartBtn").onclick = ()=> start(curTheme);
$("fullBtn").onclick = ()=> start(curTheme, collect(curTheme, false), (curTheme===null?"Все темы":THEMES[curTheme].s) + " · всё");
$("repeatBtn").onclick = ()=> start(curTheme, unknown, (curTheme===null?"Все темы":THEMES[curTheme].s) + " · сложные");
$("againBtn").onclick = ()=> goHome();
$("backBtn").onclick = goHome;
function goHome(){
  $("trainer").classList.remove("show");
  $("picker").style.display = "block";
  buildGrid();
}
$("dirBtn").onclick = ()=>{
  state.dir = 1 - state.dir; saveState();
  $("dirBtn").textContent = state.dir===0 ? "PL → RU" : "RU → PL";
  if($("trainer").classList.contains("show") && $("stage").style.display!=="none") render();
};
$("modeBtn").onclick = ()=>{
  state.dark = !state.dark; saveState(); applyDark();
};
function applyDark(){
  document.documentElement.setAttribute("data-theme", state.dark ? "dark" : "light");
  $("modeBtn").textContent = state.dark ? "☀️" : "🌙";
}
$("resetBtn").onclick = ()=>{
  if(confirm("Сбросить весь прогресс по всем темам? Это действие нельзя отменить.")){
    state.known = {}; saveState(); buildGrid(); toast("Прогресс сброшен");
    if($("trainer").classList.contains("show")) goHome();
  }
};
document.addEventListener("keydown", e=>{
  if(!$("trainer").classList.contains("show") || $("stage").style.display==="none") return;
  if(e.code==="Space"){ e.preventDefault(); $("card").classList.toggle("flip"); }
  if(e.key==="ArrowRight" || e.key==="1") answer(true);
  if(e.key==="ArrowLeft"  || e.key==="2") answer(false);
});

/* ---------- init ---------- */
loadState();
applyDark();
$("dirBtn").textContent = state.dir===0 ? "PL → RU" : "RU → PL";
buildGrid();
</script>
